services:

  postgres:
    image: postgres:16-alpine
    container_name: eterniza-postgres
    environment:
      POSTGRES_USER: eterniza
      POSTGRES_PASSWORD: eterniza123
      POSTGRES_DB: eterniza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eterniza"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eterniza-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: eterniza-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: eterniza
      RABBITMQ_DEFAULT_PASS: eterniza123
    ports:
      - "5672:5672"
      - "15672:15672"   # Painel web → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
